name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=4096'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'doff ${{ github.ref_name }}'
          releaseBody: |
            ## Download guide

            Choose the package that matches your platform:

            | Platform | Download this file | Notes |
            | --- | --- | --- |
            | macOS (Apple Silicon or Intel) | `.dmg` | Recommended installer. This build is universal, so one download works on both Apple Silicon and Intel Macs. |
            | Windows | `.msi` or `.exe` | Standard Windows installers. |
            | Linux (Ubuntu / Debian) | `.deb` | Best choice for Debian-based distributions. |
            | Linux (Fedora / RHEL / openSUSE) | `.rpm` | Best choice for RPM-based distributions. |
            | Linux (portable) | `.AppImage` | Portable build that can run without installing through a package manager. |

            Companion files such as `.sig`, `.zip`, `.tar.gz`, or updater metadata are usually not the main installer for end users.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
